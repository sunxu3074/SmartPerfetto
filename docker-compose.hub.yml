services:
  smartperfetto:
    image: ghcr.io/sunxu3074/smartperfetto:latest
    ports:
      - "3000:3000"    # Backend API
      - "10000:10000"  # Perfetto UI
    environment:
      - PORT=3000
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:10000
      - PROVIDER_DATA_DIR_OVERRIDE=/app/backend/provider-data
    env_file:
      - path: .env
        required: false
    volumes:
      - uploads:/app/backend/uploads
      - logs:/app/backend/logs
      - provider-data:/app/backend/provider-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  uploads:
  logs:
  provider-data:
